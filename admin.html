<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>诊断管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#F0F2F5;color:#333}
.c{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:22px;color:#2D59A8}
.sub{font-size:13px;color:#999;margin-bottom:16px}
.setup{background:#FFF8E1;padding:16px;border-radius:8px;margin-bottom:16px;font-size:13px;line-height:1.8}
.setup b{color:#E65100}
.actions{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.actions button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-refresh{background:#2D59A8;color:#fff}
.btn-export{background:#fff;color:#2D59A8;border:1px solid #2D59A8}
.btn-clear{background:#fff;color:#E54C5E;border:1px solid #E54C5E}
.status{font-size:12px;color:#666;margin:8px 0}
.stats{display:flex;gap:12px;margin:20px 0;flex-wrap:wrap}
.stat{flex:1;min-width:100px;background:#fff;padding:16px;border-radius:12px;text-align:center}
.stat .val{font-size:28px;font-weight:800;color:#2D59A8}
.stat .lbl{font-size:12px;color:#999;margin-top:4px}
.list{background:#fff;border-radius:12px;overflow:hidden}
.list .item{padding:16px 20px;border-bottom:1px solid #F0F2F5;cursor:pointer}
.list .item:hover{background:#F8FAFB}
.list .item:last-child{border-bottom:none}
.list .item .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.list .item .contact{font-weight:700;font-size:15px}
.list .item .time{font-size:12px;color:#999}
.list .item .info{font-size:13px;color:#666}
.grade{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;display:inline-block}
.g-excellent{background:#E8F5E9;color:#2E7D32}
.g-good{background:#E3F2FD;color:#1565C0}
.g-attention{background:#FFF3E0;color:#E65100}
.g-urgent{background:#FFEBEE;color:#C62828}
.detail{display:none;background:#fff;border-radius:12px;padding:24px;margin-top:16px}
.detail .back{font-size:14px;color:#2D59A8;cursor:pointer;margin-bottom:16px;display:inline-block}
.detail .d-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F0F2F5;font-size:14px}
.detail .d-row .dl{color:#999}
.bars{display:flex;gap:3px;margin:4px 0}
.bars .br{flex:1;height:6px;border-radius:3px;background:#E8ECF1}
.bars .br.on{background:#2D59A8}
.empty{padding:60px 20px;text-align:center;color:#999;font-size:15px;line-height:2}
.empty .icon{font-size:48px}
</style>
</head>
<body>
<div class="c">
<h1>📊 诊断管理后台</h1>
<p class="sub">wiley不歪理老师 · 英语是门理科</p>

<div class="setup" id="setupBox">
<b>⚠ 检测到数据连接失败</b><br>
请确保 WSL 中的服务器和隧道已启动：<br>
<code>ssh -i /tmp/tunnel_key -R 80:localhost:8765 localhost.run</code><br>
然后使用<b>隧道地址的管理页</b>而非此 GitHub Pages 地址。
</div>

<div class="actions">
<button class="btn-refresh" onclick="loadData()">🔄 刷新</button>
<button class="btn-export" onclick="exportCSV()">📥 导出CSV</button>
<button class="btn-clear" onclick="clearData()">🗑 清空</button>
</div>
<div class="status" id="status"></div>
<div class="stats" id="stats"></div>
<div class="list" id="list"></div>
<div class="detail" id="detail"></div>
<div class="empty" id="empty"><div class="icon">📭</div>暂无数据</div>
</div>
<script>
var API='';
// Try local API first, if on tunnel domain it will work
function loadData(){
 var s=document.getElementById('status');
 s.textContent='⏳ 加载中...';
 
 // Try tunnel-domain API first
 var url=window.location.origin+'/api/data';
 fetch(url).then(function(r){return r.json();}).then(function(data){
  render(data);
  document.getElementById('setupBox').style.display='none';
  s.textContent='✅ 共 '+data.length+' 条 · '+new Date().toLocaleTimeString();
 }).catch(function(){
  s.textContent='❌ 连接失败 · 请使用隧道地址的管理页';
  document.getElementById('setupBox').style.display='block';
 });
}

function render(data){
 if(!data.length){
  document.getElementById('empty').style.display='block';
  document.getElementById('stats').innerHTML='';document.getElementById('list').innerHTML='';return;
 }
 document.getElementById('empty').style.display='none';
 var total=data.length;
 var grades={};data.forEach(function(d){var g=d.grade;grades[g]=(grades[g]||0)+1;});
 var avg=Math.round(data.reduce(function(a,b){return a+b.score},0)/total);
 var wc=data.filter(function(d){return d.contact&&d.contact!=='未填写';}).length;
 var h='<div class="stat"><div class="val">'+total+'</div><div class="lbl">总诊断</div></div>';
 h+='<div class="stat"><div class="val">'+avg+'</div><div class="lbl">平均分</div></div>';
 h+='<div class="stat"><div class="val">'+wc+'</div><div class="lbl">已留联系</div></div>';
 document.getElementById('stats').innerHTML=h;
 var l='';
 data.forEach(function(d,i){
  var gc=d.grade==='优秀'?'g-excellent':d.grade==='良好'?'g-good':d.grade==='需要关注'?'g-attention':'g-urgent';
  l+='<div class="item" onclick="showDetail('+i+')"><div class="top"><span class="contact">'+(d.contact||'?')+'</span><span class="time">'+d.time+'</span></div><div class="info">总分 <b>'+d.score+'</b>/100 <span class="grade '+gc+'">'+d.grade+'</span></div></div>';
 });
 document.getElementById('list').innerHTML=l;
 window._data=data;
}
function showDetail(i){
 var d=window._data[i],dims=['记忆方式','语法思维','阅读策略','完形填空','写作方法','学习信心','时间效率'];
 var gc=d.grade==='优秀'?'g-excellent':d.grade==='良好'?'g-good':d.grade==='需要关注'?'g-attention':'g-urgent';
 var h='<span class="back" onclick="this.parentElement.style.display=\'none\'">← 返回</span>';
 h+='<h3>'+d.contact+' · '+d.score+'分 <span class="grade '+gc+'">'+d.grade+'</span></h3>';
 (d.dimScores||[]).forEach(function(s,j){
  var b='';for(var k=0;k<5;k++)b+='<div class="br'+(k<Math.ceil(s/20)?' on':'')+'"></div>';
  h+='<div class="d-row"><span class="dl">'+dims[j]+'</span><span>'+s+'/100 <div class="bars">'+b+'</div></span></div>';
 });
 document.getElementById('detail').innerHTML=h;document.getElementById('detail').style.display='block';
}
function exportCSV(){
 var d=window._data||[];if(!d.length)return alert('无数据');
 var dims=['记忆方式','语法思维','阅读策略','完形填空','写作方法','学习信心','时间效率'];
 var csv='时间,联系方式,总分,等级,'+dims.join(',')+'\n';
 d.forEach(function(r){csv+=r.time+','+(r.contact||'')+','+r.score+','+r.grade+','+(r.dimScores||[]).join(',')+'\n';});
 var b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
 var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='诊断_'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function clearData(){
 if(!confirm('确定清空？'))return;
 fetch(window.location.origin+'/api/submit',{method:'DELETE'}).then(function(){loadData();});
}
loadData();
</script>
</body>
</html>
